version: 2
updates:
  - package-ecosystem: "npm"
    # Repository root contains package.json.
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
    groups:
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    # Auto-merge is intentionally not configured; maintainers review PRs manually.
